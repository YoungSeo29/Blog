<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f5f5f3;
            font-family: 'Noto Sans KR', sans-serif;
            color: #1a1a1a;
            padding: 2rem;
        }

        .container { max-width: 860px; margin: 0 auto; }

        .profile-card {
            background: #ffffff;
            border: 0.5px solid #e0e0e0;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
        }

        .profile-image-wrapper { position: relative; flex-shrink: 0; cursor: pointer; }

        .profile-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #f0f0f0;
            border: 0.5px solid #d0d0d0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }

        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }

        .profile-edit-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ffffff;
            border: 0.5px solid #d0d0d0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }

        .profile-info { flex: 1; min-width: 0; }

        .nickname-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .nickname-text { font-size: 18px; font-weight: 500; }

        .nickname-edit-row {
            display: none;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .email-text { font-size: 13px; color: #888; }

        .section-label {
            font-size: 13px;
            font-weight: 500;
            color: #888;
            margin-bottom: 12px;
            padding-left: 2px;
        }

        .article-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }

        .article-item {
            background: #ffffff;
            border: 0.5px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.15s;
        }

        .article-item:hover { border-color: #aaa; }
        .article-title { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
        .article-date { font-size: 12px; color: #888; }
        .article-link { font-size: 13px; color: #888; white-space: nowrap; }

        .empty-text { font-size: 13px; color: #aaa; padding: 1rem 0; }

        .coupon-item {
            background: #ffffff;
            border: 0.5px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .coupon-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #f59e0b;
        }

        .coupon-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; padding-left: 8px; }
        .coupon-expiry { font-size: 12px; color: #888; padding-left: 8px; }
        .coupon-count { font-size: 13px; color: #f59e0b; font-weight: 500; }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 2rem;
        }

        .page-info { font-size: 13px; color: #888; padding: 0 8px; }

        input[type="text"] {
            border: 0.5px solid #d0d0d0;
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 13px;
            outline: none;
            width: 180px;
            font-family: 'Noto Sans KR', sans-serif;
        }

        input[type="text"]:focus { border-color: #999; }

        button {
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            border: 0.5px solid #d0d0d0;
            background: transparent;
            border-radius: 8px;
            font-size: 12px;
            padding: 4px 12px;
            color: #333;
            transition: background 0.15s;
        }

        button:hover { background: #f5f5f5; }

        .btn-logout { display: block; margin: 0 auto; padding: 8px 24px; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">

    <!-- 프로필 카드 -->
    <div class="profile-card">
        <div class="profile-image-wrapper">
            <div class="profile-circle" id="profile-circle" onclick="document.getElementById('file-input').click()">
                <svg th:if="${user.profileImage == null}" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
                <img th:if="${user.profileImage != null}" th:src="${user.profileImage}" alt="프로필">
            </div>
            <div class="profile-edit-btn" onclick="document.getElementById('file-input').click()">+</div>
            <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="uploadProfileImage(event)">
        </div>

        <div class="profile-info">
            <div class="nickname-row">
                <span class="nickname-text" id="nickname-text"
                      th:text="${user.nickname != null ? user.nickname : '닉네임 없음'}">닉네임</span>
                <button onclick="toggleNicknameEdit()">수정</button>
            </div>
            <div class="nickname-edit-row" id="nickname-edit-row">
                <input type="text" id="nickname-input" placeholder="닉네임 입력">
                <button onclick="saveNickname()">저장</button>
                <button onclick="toggleNicknameEdit()">취소</button>
            </div>
            <div class="email-text" th:text="${user.email}">email@example.com</div>
        </div>
    </div>

    <!-- 내가 쓴 글 -->
    <div class="section-label">내가 쓴 글</div>
    <div class="article-list">
        <div th:if="${#lists.isEmpty(articles)}" class="empty-text">작성한 글이 없어요.</div>
        <div th:each="item : ${articles}" class="article-item">
            <div>
                <div class="article-title" th:text="${item.title}">글 제목</div>
            </div>
            <a th:href="@{/articles/{id}(id=${item.id})}" class="article-link">보러가기 →</a>
        </div>
    </div>

    <!-- 페이지네이션 -->
    <div class="pagination">
        <button th:onclick="|location.href='@{/my-page?page={p}(p=${currentPage - 1})}'|"
                th:disabled="${currentPage == 0}">이전</button>
        <span class="page-info" th:text="${currentPage + 1} + ' / ' + ${totalPages}">1 / 1</span>
        <button th:onclick="|location.href='@{/my-page?page={p}(p=${currentPage + 1})}'|"
                th:disabled="${currentPage + 1 >= totalPages}">다음</button>
    </div>

    <!-- 내 쿠폰함 -->
    <div class="section-label" style="margin-top: 1rem;">내 쿠폰함</div>
    <div class="article-list">
        <div th:if="${#lists.isEmpty(myCoupons)}" class="empty-text">보유한 쿠폰이 없어요.</div>
        <div th:each="coupon : ${myCoupons}" class="coupon-item">
            <div>
                <div class="coupon-name">선착순 100명 특별 할인 쿠폰</div>
                <div class="coupon-expiry" th:text="|유효기간: 2026.12.31 · 발급일: ${#temporals.format(coupon.createdAt, 'yyyy-MM-dd')}|"></div>
            </div>
            <span class="coupon-count">1장</span>
        </div>
    </div>

    <button class="btn-logout" id="logout-btn">로그아웃</button>
</div>

<script src="/js/article.js"></script>
<script src="/js/myPage.js"></script>
</body>
</html>
