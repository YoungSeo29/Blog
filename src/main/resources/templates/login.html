<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:wght@700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: #ffffff;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 36px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            background: #ffffff;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
            margin-bottom: 24px;
        }

        .google-btn:hover { background: #f0f0f0; text-decoration: none; color: #333; }
        .google-btn img { width: 20px; height: 20px; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2a2a;
        }

        .divider span { color: #444; font-size: 0.8rem; }

        label {
            display: block;
            color: #aaa;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }

        input:focus { border-color: #555; }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #ffffff;
            color: #0f0f0f;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
            margin-bottom: 12px;
        }

        .btn-login:hover { background: #ddd; }

        .btn-signup {
            width: 100%;
            padding: 13px;
            background: transparent;
            color: #666;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .btn-signup:hover { border-color: #555; color: #aaa; }
    </style>
</head>
<body>
<div class="card">
    <h2>로그인</h2>
    <p class="subtitle">서비스를 사용하려면 로그인을 해주세요</p>

    <!-- 구글 로그인 -->
    <a href="/oauth2/authorization/google" class="google-btn">
        <img th:src="@{/img/google.png}" alt="Google">
        Google로 계속하기
    </a>

    <div class="divider"><span>또는</span></div>

    <!-- 이메일 로그인 -->
    <div>
        <label>이메일</label>
        <input type="email" id="email" placeholder="example@email.com">

        <label>비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호 입력">

        <button type="button" class="btn-login" onclick="login()">로그인</button>
        <button type="button" class="btn-signup" onclick="location.href='/signup'">회원가입</button>
    </div>
</div>

<script src="/js/login.js"></script>
</body>
</html>
