<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>쿠폰</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f3;
      font-family: 'Noto Sans KR', sans-serif;
      padding: 2rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 24px;
      color: #1a1a1a;
    }

    .coupon-card {
      background: #ffffff;
      border: 0.5px solid #e0e0e0;
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* 쿠폰 왼쪽 포인트 컬러 */
    .coupon-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      background: #f59e0b;
      border-radius: 16px 0 0 16px;
    }

    .coupon-info {
      flex: 1;
      padding-left: 0.5rem;
    }

    .coupon-name {
      font-size: 18px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .coupon-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .coupon-remaining {
      font-size: 13px;
      color: #888;
    }

    .coupon-remaining span {
      font-weight: 500;
      color: #f59e0b;
    }

    .coupon-expiry {
      font-size: 13px;
      color: #888;
    }

    .coupon-btn {
      flex-shrink: 0;
      padding: 10px 24px;
      background: #f59e0b;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background 0.15s;
    }

    .coupon-btn:hover { background: #d97706; }
    .coupon-btn:disabled {
      background: #d0d0d0;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="page-title">쿠폰함</div>

  <div class="coupon-card">
    <div class="coupon-info">
      <div class="coupon-name">선착순 100명 특별 할인 쿠폰</div>
      <div class="coupon-meta">
        <div class="coupon-remaining">
          잔여 수량 <span id="remaining-count">100</span>개
        </div>
        <div class="coupon-expiry">유효기간: 2026.12.31까지</div>
      </div>
    </div>
    <button type="button" class="coupon-btn" id="receive-coupon-btn">
      쿠폰 받기
    </button>
  </div>
</div>

<script src="/js/coupon.js"></script>
</body>
</html>
